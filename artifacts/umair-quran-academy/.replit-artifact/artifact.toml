kind = "web"
previewPath = "/"
title = "Umair Quran Academy"
version = "1.0.0"
id = "artifacts/umair-quran-academy"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23244

[services.development]
run = "pnpm --filter @workspace/umair-quran-academy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/umair-quran-academy", "run", "build" ]
serve = "static"
publicDir = "artifacts/umair-quran-academy/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23244"
BASE_PATH = "/"
